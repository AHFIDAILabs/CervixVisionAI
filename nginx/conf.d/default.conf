# ── Upstream services ────────────────────────────────────────────────────────
upstream backend {
    server backend:5000;
    keepalive 32;
}

upstream ai_engine {
    server ai_engine:8000;
    keepalive 8;
}

# ── Development server (HTTP only) ───────────────────────────────────────────
server {
    listen 80;
    server_name localhost;

    # Proxy headers passed to every upstream
    proxy_set_header  Host               $host;
    proxy_set_header  X-Real-IP          $remote_addr;
    proxy_set_header  X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header  X-Forwarded-Proto  $scheme;
    proxy_http_version  1.1;

    # ── Auth endpoints — strict rate limit ───────────────────────────────────
    location /api/v1/auth/forgot-password {
        limit_req zone=forgot_zone burst=2 nodelay;
        proxy_pass http://backend;
    }

    location /api/v1/auth/ {
        limit_req zone=auth_zone burst=10 nodelay;
        proxy_pass http://backend;
    }

    # ── General API ──────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=30 nodelay;
        proxy_pass http://backend;
    }

    # ── Health check (no rate limit) ─────────────────────────────────────────
    location /health {
        proxy_pass http://backend;
    }

    # ── Socket.io WebSocket upgrade ──────────────────────────────────────────
    location /socket.io/ {
        proxy_pass   http://backend;
        proxy_set_header  Upgrade     $http_upgrade;
        proxy_set_header  Connection  "upgrade";
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── AI Engine docs (dev only — remove in production) ─────────────────────
    location /ai/ {
        limit_req zone=api_zone burst=20 nodelay;
        rewrite ^/ai/(.*)$ /$1 break;
        proxy_pass http://ai_engine;
    }
}
