user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens   off;        # hide nginx version from response headers

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript;

    # ── Rate-limit zones (shared across all server blocks) ────────────────────
    # Auth endpoints: 10 requests/minute per IP
    limit_req_zone  $binary_remote_addr  zone=auth_zone:10m     rate=10r/m;
    # Forgot-password: 5 requests/hour per IP
    limit_req_zone  $binary_remote_addr  zone=forgot_zone:10m   rate=5r/h;
    # General API: 100 requests/minute per IP
    limit_req_zone  $binary_remote_addr  zone=api_zone:10m      rate=100r/m;

    # Return JSON on rate-limit instead of default HTML
    limit_req_status  429;

    include /etc/nginx/conf.d/*.conf;
}
