# .github/workflows/ci-cd.yml
# CI for the ai_engine (Python ML service) within the CervixVisionAI monorepo.
#
# This previously lived at ai_engine/.github/workflows/ci-cd.yml — GitHub
# Actions only discovers workflows under <repo-root>/.github/workflows/, so it
# never actually ran from there. Moved here to make it live, scoped to
# ai_engine/ via `paths` (so backend/frontend-only changes don't trigger it)
# and `working-directory` (since the checkout root is now the monorepo root,
# not ai_engine/).

name: AI Engine CI

on:
  push:
    branches: [ "main" ]
    paths: [ "ai_engine/**" ]
  pull_request:
    branches: [ "main" ]
    paths: [ "ai_engine/**" ]

defaults:
  run:
    working-directory: ai_engine

jobs:
  build:
    # The 'build' job runs on an Ubuntu runner
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Step 3: Install project dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # Step 4 (Optional but recommended): Add linting and testing steps here
    # For example, using flake8 for linting:
    - name: Lint with flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --max-complexity=10 --max-line-length=127 --statistics

# No deploy job here — deployment is no longer via Render (render.yaml has been
# removed). The project now ships via the Docker Compose + nginx stack
# documented in DEPLOYMENT.md, run on the target server rather than triggered
# from CI.