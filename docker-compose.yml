services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: cervixvisionai_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Node.js Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cervixvisionai_backend
    # Port 5000 exposed for direct dev access; nginx also proxies it on port 80
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/cervixvisionai
      ML_SERVICE_URL: http://ai_engine:8000
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: ["npx", "nodemon", "index.js"]
    restart: unless-stopped

  # ── Python AI Engine ──────────────────────────────────────────────────────────
  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    container_name: cervixvisionai_ai_engine
    ports:
      - "8000:8000"
    env_file:
      - ./ai_engine/.env
    environment:
      BACKEND_ALLOWED_ORIGIN: http://backend:5000
    volumes:
      - ./ai_engine/artifacts:/app/artifacts
      - ./ai_engine/config:/app/config
    restart: unless-stopped

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: cervixvisionai_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - ai_engine
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
