services:

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: cervixvisionai_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017 --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Node.js Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cervixvisionai_backend
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    # Load the service .env then override inter-service URLs with Docker hostnames
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/cervixvisionai
      ML_SERVICE_URL: http://ai_engine:8000
    # Source mount for development — changes reflect without rebuilding
    volumes:
      - ./backend:/app
      - /app/node_modules          # keep container node_modules isolated
    command: ["npx", "nodemon", "index.js"]
    restart: unless-stopped

  # ── Python AI Engine ──────────────────────────────────────────────────────────
  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    container_name: cervixvisionai_ai_engine
    ports:
      - "8000:8000"
    env_file:
      - ./ai_engine/.env
    environment:
      BACKEND_ALLOWED_ORIGIN: http://backend:5000
    # Mount artifacts so trained models persist across container restarts
    volumes:
      - ./ai_engine/artifacts:/app/artifacts
      - ./ai_engine/config:/app/config
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local
