# Production overrides — use alongside the base compose file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key differences from dev:
#   - nginx serves HTTPS on 443 with Let's Encrypt certs + certbot auto-renewal
#   - backend and ai_engine ports are unexposed (only reachable via nginx)
#   - No source volume mounts (code baked into images)
#   - Backend runs with `node`, ai_engine with 2 Uvicorn workers
#   - MongoDB requires authentication
#   - All services restart:always

services:

  mongodb:
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:?MONGO_USER is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_INITDB_DATABASE: cervixvisionai

  backend:
    restart: always
    command: ["node", "index.js"]
    ports: []                      # unexposed — only reachable via nginx internally
    volumes: []
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/cervixvisionai?authSource=admin
      ML_SERVICE_URL: http://ai_engine:8000

  ai_engine:
    restart: always
    command: ["uvicorn", "app.api:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    ports: []                      # unexposed — only reachable via nginx internally
    volumes:
      - ./ai_engine/artifacts:/app/artifacts:ro
      - ./ai_engine/config:/app/config:ro

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required}

  # Certbot — run manually to issue or renew certs:
  #   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
  #     --profile certbot run --rm certbot certonly --webroot \
  #     --webroot-path=/var/www/certbot -d your.domain.com \
  #     --email you@example.com --agree-tos --no-eff-email
  certbot:
    image: certbot/certbot:latest
    container_name: cervixvisionai_certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    profiles:
      - certbot

volumes:
  mongo_data:
    driver: local
  certbot_www:
    driver: local
